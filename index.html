<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WFM Dashboard</title>

<!-- Bootstrap dulu -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Custom override terakhir -->
<link rel="stylesheet" href="css/custom.css">

<!-- Icon bebas -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg,#f5f7fa,#e4e8eb);
}

.kpi-card {
  border-radius: 12px;
  padding: 10px;
  text-align: center;
  background: #e1e1e1;
  box-shadow: 0 5px 15px rgba(0,0,0,.05);
}

.kpi-title {
  font-size: 12px;
  color: #6c757d;
}

.kpi-value {
  font-size: 18px;
  font-weight: 700;
  color: #7a0f14;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-merah px-4">
  <div class="d-flex align-items-center gap-2">
    <img src="./images/logo.png" height="40">
  </div>

  <span class="text-white" id="welcome"></span>

  <button class="btn btn-outline-light btn-sm" onclick="logout()">
    <i class="bi bi-box-arrow-right"></i> Logout
  </button>
</nav>

<!-- MENU -->
<div class="bg-white border-bottom">
  <div class="container py-2">
    <ul class="nav nav-pills" id="menuBar">
      <li class="nav-item"><button class="nav-link active" data-page="schedule">Schedule</button></li>
      <li class="nav-item"><button class="nav-link" data-page="swap">Swap</button></li>
      <li class="nav-item"><button class="nav-link" data-page="productivity">Productivity</button></li>
      <li class="nav-item"><button class="nav-link" data-page="attendance">Attendance</button></li>
      <li class="nav-item"><button class="nav-link" data-page="admin">Admin</button></li>
    </ul>
  </div>
</div>

<!-- CONTENT -->
<div class="container py-4">

  <!-- SCHEDULE -->
  <div id="schedule" class="card shadow-sm d-none">
    <div class="card-body">

      <h5 class="mb-3">
        <i class="bi bi-calendar-week"></i> View Schedule
      </h5>

      <!-- FILTER -->
      <div class="d-flex flex-wrap gap-2 mb-3">
        <button class="btn btn-outline-custom btn-sm" onclick="filterToday()">Today</button>
        <button class="btn btn-outline-custom btn-sm" onclick="filterWeek()">This Week</button>
        <button class="btn btn-outline-custom btn-sm" onclick="filterMonth()">This Month</button>

        <div class="d-flex align-items-center gap-2">
          <input type="date" id="startDate" class="form-control form-control-sm">
          <span>→</span>
          <input type="date" id="endDate" class="form-control form-control-sm">
          <button class="btn btn-custom btn-sm" onclick="filterRange()">Apply</button>
        </div>
      </div>

      <!-- KPI -->
      <div class="row g-3 mb-3">

        <div class="col-6 col-md-3">
          <div class="kpi-card">
            <div class="kpi-title">Volume</div>
            <div class="kpi-value" id="sumVolume">0</div>
          </div>
        </div>

        <div class="col-6 col-md-3">
          <div class="kpi-card">
            <div class="kpi-title">Act Hours</div>
            <div class="kpi-value" id="ratioActual">0%</div>
          </div>
        </div>

        <div class="col-6 col-md-3">
          <div class="kpi-card">
            <div class="kpi-title">AHT</div>
            <div class="kpi-value" id="avgAHT">00:00</div>
          </div>
        </div>

        <div class="col-6 col-md-3">
          <div class="kpi-card">
            <div class="kpi-title">Occupancy</div>
            <div class="kpi-value" id="occupancy">0%</div>
          </div>
        </div>

      </div>

      <!-- TABLE -->
      <div class="table-responsive">
        <table class="table table-kpi table-hover align-middle text-center">
          <thead class="table-dark">
            <tr>
              <th>Date</th>
              <th>Shift</th>
              <th>Start</th>
              <th>End</th>
              <th>Break Start</th>
              <th>Break End</th>
              <th>Planned</th>
              <th>Actual</th>
              <th>Volume</th>
              <th>Handling Time</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="scheduleBody"></tbody>
        </table>
      </div>

    </div>
  </div>

  <!-- OTHER PAGES -->
  <div id="swap" class="card shadow-sm d-none"><div class="card-body">Coming soon...</div></div>
  <div id="productivity" class="card shadow-sm d-none"><div class="card-body">Coming soon...</div></div>
  <div id="attendance" class="card shadow-sm d-none"><div class="card-body">Coming soon...</div></div>
  <div id="admin" class="card shadow-sm d-none"><div class="card-body">Coming soon...</div></div>

</div>

<!-- FOOTER -->
<footer class="text-center py-2 bg-white border-top fixed-bottom">
  Agent Management System copyright &copy; 2026
</footer>

<!-- SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./js/supabaseClient.js"></script>
<script src="./js/modules/schedule.js"></script>
<script src="./js/dashboard.js"></script>

<!-- MENU CONTROLLER -->
<script>
document.querySelectorAll("#menuBar .nav-link").forEach(btn => {
  btn.addEventListener("click", () => {

    document.querySelectorAll("#menuBar .nav-link")
      .forEach(b => b.classList.remove("active"));

    btn.classList.add("active");

    document.querySelectorAll(".card")
      .forEach(c => c.classList.add("d-none"));

    document.getElementById(btn.dataset.page)
      .classList.remove("d-none");

  });
});

// default load
document.querySelector('[data-page="schedule"]').click();
</script>

</body>
</html>
