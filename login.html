<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>WFM Login</title>

<link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="./css/login.css">
<script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>

<!-- Supabase Library (WAJIB PALING ATAS) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="container-fluid">
  <div class="row">
  <div class="col-10 col-sm-8 col-md-4 offset-1 offset-sm-2 offset-md-4 py-3">
  <div class="login-card">
    <div class="logo">
      <img src="./images/logo.png" alt="logo">
      <h2>TransRoaster</h2>
      <p>Agent Management System</p>
    </div>

    <!-- FORM LOGIN -->
<form id="loginForm">

  <div class="mb-3">
  <label for="agent_id">Agent ID</label>    
  <div class="input-group">
    <input class="form-control" type="text" id="agent_id" placeholder="Enter your ID" required>
  </div>
  </div>  

  <div class="mb-3">
   <label for="password">Password</label>    
    <div class="input-group">
        <input class="form-control position-relative" type="password" id="password" placeholder="Enter your password" required>
        <span class="input-group-text" id="togglePass">👁</span>        
    </div>
  </div>

  <div id="error" class="error"></div>

  <button type="submit" id="loginBtn">Login</button>
  <div id="loading" class="loading" style="display:none;">Checking account...</div>
  

</form>


  </div>
</div>
  </div>
</div>

<!-- ========================= -->
<!-- LOAD ORDER PENTING BANGET -->
<!-- ========================= -->

<!-- 1. Koneksi DB -->
<script src="./js/supabaseClient.js"></script>

<!-- 2. Logic Login -->
<script src="./js/login.js"></script>


<!-- 3. UI Script -->
<script>
document.getElementById("togglePass").addEventListener("click", function(){
  const pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
});
</script>

</body>
</html>
